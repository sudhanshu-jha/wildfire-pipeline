server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ingestion/ {
        proxy_pass http://ingestion:8000/;
    }

    location /api/detection/ {
        proxy_pass http://detection:8000/;
    }

    location /api/prediction/ {
        proxy_pass http://prediction:8000/;
    }

    location /api/alerting/ws/ {
        proxy_pass http://alerting:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    location /api/alerting/ {
        proxy_pass http://alerting:8000/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
