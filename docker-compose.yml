version: "3.9"

services:
  # ── Message broker ──────────────────────────────────────────────────────────
  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222" # monitoring UI: http://localhost:8222

  # ── Persistence ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wildfire
      POSTGRES_PASSWORD: wildfire
      POSTGRES_DB: wildfire
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wildfire"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Kafka (alternative transport — set TRANSPORT=kafka to use) ───────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CLUSTER_ID: "wildfire-kafka-cluster-1"
    profiles:
      - kafka  # only starts with: docker compose --profile kafka up

  # ── Pipeline services ────────────────────────────────────────────────────────
  ingestion:
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    ports:
      - "8001:8000"
    environment:
      - NATS_URL=nats://nats:4222
      - DATABASE_URL=postgresql://wildfire:wildfire@postgres:5432/wildfire
      - TRANSPORT=nats
    depends_on:
      nats:
        condition: service_started
      postgres:
        condition: service_healthy

  detection:
    build:
      context: .
      dockerfile: services/detection/Dockerfile
    ports:
      - "8002:8000"
    environment:
      - NATS_URL=nats://nats:4222
      - DATABASE_URL=postgresql://wildfire:wildfire@postgres:5432/wildfire
      - TRANSPORT=nats
      # Set DETECTION_MODEL_PATH to enable real ONNX inference:
      # - DETECTION_MODEL_PATH=/models/yolov8-fire.onnx
    depends_on:
      nats:
        condition: service_started
      postgres:
        condition: service_healthy

  prediction:
    build:
      context: .
      dockerfile: services/prediction/Dockerfile
    ports:
      - "8003:8000"
    environment:
      - NATS_URL=nats://nats:4222
      - DATABASE_URL=postgresql://wildfire:wildfire@postgres:5432/wildfire
      - TRANSPORT=nats
    depends_on:
      nats:
        condition: service_started
      postgres:
        condition: service_healthy

  alerting:
    build:
      context: .
      dockerfile: services/alerting/Dockerfile
    ports:
      - "8004:8000"
    environment:
      - NATS_URL=nats://nats:4222
      - DATABASE_URL=postgresql://wildfire:wildfire@postgres:5432/wildfire
      - TRANSPORT=nats
    depends_on:
      nats:
        condition: service_started
      postgres:
        condition: service_healthy

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - ingestion
      - detection
      - prediction
      - alerting

volumes:
  postgres_data:
